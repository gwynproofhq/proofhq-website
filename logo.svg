<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 32" role="img" aria-label="PROOF">
  <title>PROOF</title>

  <!-- Left bracket: spine at x=6, caps extend 8px right to x=14 -->
  <path d="M14,2 L6,2 L6,30 L14,30"
        fill="none" stroke="#00C2C7" stroke-width="2.5" stroke-linecap="square"/>

  <!-- PROOF: starts at x=20, width=70, so centred at x=55 -->
  <text x="20" y="16"
        dominant-baseline="central"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20"
        font-weight="500"
        letter-spacing="0.05em"
        fill="#1B2A4A">PROOF</text>

  <!-- Right bracket: spine at x=104, caps extend 8px left to x=96 -->
  <path d="M96,2 L104,2 L104,30 L96,30"
        fill="none" stroke="#00C2C7" stroke-width="2.5" stroke-linecap="square"/>
</svg>
